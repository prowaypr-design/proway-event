<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROWAY Security Day — LIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080920;--bg2:#0e0f28;--bg3:#13152f;
  --cyan:#a29bfe;--violet:#6c5ce7;--orange:#ee672a;
  --yellow:#f5e642;--white:#fff;
  --text:#ffffffcc;--text2:#ffffff66;--text3:#ffffff22;
  --border:#6c5ce722;--border2:#6c5ce744;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);}

/* GRID BG */
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(108,92,231,.08),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}

/* HEADER */
.live-header{display:flex;align-items:center;justify-content:space-between;padding:24px 40px 20px;border-bottom:1px solid var(--border);position:relative;z-index:2;}
.live-logo{font-family:'Bangers',cursive;font-size:28px;color:var(--white);letter-spacing:6px;}
.live-logo span{color:var(--cyan);}
.live-badge{display:flex;align-items:center;gap:8px;background:rgba(162,155,254,.1);border:1px solid var(--border2);border-radius:20px;padding:6px 16px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-label{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--cyan);letter-spacing:3px;}
.live-time{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text2);}

/* MAIN AREA */
.live-body{position:relative;z-index:2;height:calc(100vh - 85px);display:flex;flex-direction:column;}

/* ── РЕЙТИНГ ── */
#screen-rating{display:none;padding:32px 40px;height:100%;overflow:hidden;}
#screen-rating.active{display:flex;flex-direction:column;}
.rating-title{font-family:'Bangers',cursive;font-size:36px;color:var(--white);letter-spacing:6px;margin-bottom:24px;display:flex;align-items:center;gap:16px;}
.rating-title .upd{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:2px;}

.top3{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:16px;margin-bottom:28px;align-items:end;}
.top-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:20px;text-align:center;position:relative;transition:transform .5s;}
.top-card.first{border-color:var(--yellow);background:rgba(245,230,66,.05);}
.top-card.second{border-color:var(--cyan);}
.top-card.third{border-color:var(--text2);}
.top-pos{font-family:'Bangers',cursive;font-size:48px;line-height:1;margin-bottom:8px;}
.top-card.first .top-pos{color:var(--yellow);}
.top-card.second .top-pos{color:var(--cyan);}
.top-card.third .top-pos{color:var(--text2);}
.top-codename{font-family:'Bangers',cursive;font-size:22px;letter-spacing:3px;color:var(--white);margin-bottom:4px;}
.top-name{font-size:14px;color:var(--text2);margin-bottom:4px;}
.top-pts{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--cyan);}

.lb-list{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:6px;}
.lb-item{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;transition:all .5s;}
.lb-item.new-entry{animation:slideIn .5s ease;}
@keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:none;opacity:1}}
.lb-rank{font-family:'Bangers',cursive;font-size:22px;min-width:32px;color:var(--text3);}
.lb-av{width:40px;height:40px;border-radius:50%;border:1px solid var(--border2);overflow:hidden;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:14px;color:var(--text2);}
.lb-av img{width:100%;height:100%;object-fit:cover;}
.lb-info{flex:1;min-width:0;}
.lb-iname{font-size:15px;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-ico{font-size:12px;color:var(--text2);}
.lb-ipts{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--cyan);}
.lb-bar-wrap{width:120px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.lb-bar{height:100%;background:linear-gradient(90deg,var(--violet),var(--cyan));border-radius:2px;transition:width 1s ease;}

/* ── ОПРОС ── */
#screen-poll{display:none;padding:40px;height:100%;overflow:hidden;}
#screen-poll.active{display:flex;flex-direction:column;}
.poll-session-label{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--cyan);letter-spacing:4px;margin-bottom:12px;}
.poll-question{font-family:'Bangers',cursive;font-size:clamp(28px,4vw,48px);color:var(--white);letter-spacing:2px;line-height:1.1;margin-bottom:32px;}
.poll-total{font-size:14px;color:var(--text2);margin-bottom:24px;}
.poll-options{flex:1;display:flex;flex-direction:column;gap:14px;justify-content:center;}
.poll-opt-row{display:flex;align-items:center;gap:16px;}
.poll-opt-label{font-size:15px;font-weight:700;color:var(--white);min-width:280px;max-width:320px;}
.poll-bar-wrap{flex:1;height:32px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;overflow:hidden;position:relative;}
.poll-bar-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--violet),var(--cyan));border-radius:4px;transition:width 1s ease;}
.poll-bar-fill.top{background:linear-gradient(90deg,var(--orange),var(--yellow));}
.poll-opt-pct{font-family:'Bangers',cursive;font-size:22px;color:var(--cyan);min-width:60px;text-align:right;}
.poll-opt-count{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);min-width:48px;}

/* TICKER */
.ticker{position:fixed;bottom:0;left:0;right:0;height:32px;background:var(--bg2);border-top:1px solid var(--border);overflow:hidden;display:flex;align-items:center;z-index:10;}
.ticker-inner{display:inline-flex;white-space:nowrap;gap:64px;animation:tickerMove 30s linear infinite;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:2px;}
@keyframes tickerMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* LOADER */
.loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--cyan);letter-spacing:4px;}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow"></div>

<div class="loader" id="loader">ЗАГРУЗКА...</div>

<div class="live-header">
  <div class="live-logo">PROWAY <span>SECURITY DAY</span></div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <div class="live-label" id="mode-label">РЕЙТИНГ</div>
  </div>
  <div class="live-time" id="clock"></div>
</div>

<div class="live-body">

  <!-- РЕЙТИНГ -->
  <div id="screen-rating" class="active">
    <div class="rating-title">
      РЕЙТИНГ АГЕНТОВ
      <span class="upd" id="upd-time">// ОБНОВЛЕНИЕ...</span>
    </div>
    <div class="top3" id="top3"></div>
    <div class="lb-list" id="lb-list"></div>
  </div>

  <!-- ОПРОС -->
  <div id="screen-poll">
    <div class="poll-session-label" id="poll-session"></div>
    <div class="poll-question" id="poll-question">Загрузка...</div>
    <div class="poll-total" id="poll-total"></div>
    <div class="poll-options" id="poll-options"></div>
  </div>

</div>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-inner" id="ticker-inner">
    <span>PROWAY SECURITY DAY 2026</span>
    <span>PROWAY SECURITY DAY 2026</span>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyDyYFwHvLPwHZSqd2abQCLhr9RaoqgVTA96OIw4-mxvRSRkioSe2Th2MD8LYiKhRFstw/exec';

let currentMode = 'rating';
let currentPollId = null;
let prevRanks = {};
let localPolls = [
  {id:'poll1',session:'// SECURITY_TALKS',question:'Что будет основным «рецептом» выживаемости вендоров на российском рынке?',options:['Регуляторка — соответствие требованиям','Технологии — развитие до мировых решений','Комплексный подход — экосистемы','Маркетинг — расширение аудитории'],votes:[0,0,0,0]},
  {id:'poll2',session:'// ПРЯМАЯ_ЛИНИЯ',question:'Что является решающим фактором при выборе NGFW?',options:['Цена','Производительность','Функциональность','Сертификация','Другое'],votes:[0,0,0,0,0]},
  {id:'poll3',session:'// ПРЯМАЯ_ЛИНИЯ',question:'Готовы ли российские ИБ-решения полностью заменить зарубежные?',options:['Полностью готовы','В большинстве сегментов','Есть пробелы','Пока не готовы'],votes:[0,0,0,0]},
];

async function apiGet(params){
  const url = new URL(API);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const r = await fetch(url,{redirect:'follow'});
  return r.json();
}

// ── ЧАСЫ ──────────────────────────────────────────────
function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ── РЕЖИМ ─────────────────────────────────────────────
async function checkMode(){
  try{
    const res = await apiGet({action:'getAnnouncements'});
    const anns = res.announcements||[];
    
    // Ищем команды управления экраном
    const modeCmd = anns.find(a=>a.message.startsWith('__LIVE_MODE__'));
    if(modeCmd){
      const parts = modeCmd.message.replace('__LIVE_MODE__','').split(':');
      const newMode = parts[0];
      const newPoll = parts[1]||null;
      if(newMode !== currentMode || newPoll !== currentPollId){
        currentMode = newMode;
        currentPollId = newPoll;
        switchScreen(currentMode);
      }
    }

    // Обновляем ticker из объявлений
    const visible = anns.filter(a=>!a.message.startsWith('__'));
    if(visible.length){
      const msgs = [...visible,...visible].map(a=>
        `<span>${a.message}</span>`).join('');
      document.getElementById('ticker-inner').innerHTML = msgs;
    }
  }catch(e){}
}

function switchScreen(mode){
  document.getElementById('screen-rating').classList.toggle('active', mode==='rating');
  document.getElementById('screen-poll').classList.toggle('active', mode==='poll');
  document.getElementById('mode-label').textContent = mode==='rating' ? 'РЕЙТИНГ' : 'ОПРОС';
  if(mode==='poll' && currentPollId) updatePoll();
}

// ── РЕЙТИНГ ──────────────────────────────────────────
async function updateRating(){
  if(currentMode !== 'rating') return;
  try{
    const res = await apiGet({action:'getLeaderboard'});
    const lb = res.leaderboard || [];
    if(!lb.length) return;
    const maxPts = lb[0].points || 1;

    // Топ-3
    const top3El = document.getElementById('top3');
    const podium = [lb[1]||null, lb[0]||null, lb[2]||null]; // 2,1,3 для пьедестала
    const classes = ['second','first','third'];
    const labels = ['2','1','3'];
    top3El.innerHTML = podium.map((p,i)=>{
      if(!p) return`<div></div>`;
      return`<div class="top-card ${classes[i]}">
        <div class="top-pos">${labels[i]}</div>
        <div class="top-codename">${p.codename||p.name}</div>
        <div class="top-name">${p.name}</div>
        <div class="top-pts">${p.points} б</div>
      </div>`;
    }).join('');

    // Список 4-10
    const rest = lb.slice(3,10);
    const listEl = document.getElementById('lb-list');
    listEl.innerHTML = rest.map((p,i)=>{
      const rank = i+4;
      const prevRank = prevRanks[p.id];
      const isNew = prevRank && prevRank > rank;
      const barW = Math.round(p.points/maxPts*100);
      const avHtml = p.avatar
        ? `<img src="${p.avatar}" alt="" onerror="this.style.display='none'">`
        : p.codename?.slice(0,2)||'??';
      return`<div class="lb-item ${isNew?'new-entry':''}">
        <div class="lb-rank">${rank}</div>
        <div class="lb-av">${avHtml}</div>
        <div class="lb-info">
          <div class="lb-iname">${p.name}</div>
          <div class="lb-ico">${p.company||''} · ${p.codename||''}</div>
        </div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${barW}%"></div></div>
        <div class="lb-ipts">${p.points}</div>
      </div>`;
    }).join('');

    lb.forEach((p,i)=>prevRanks[p.id]=i+1);
    document.getElementById('upd-time').textContent = '// ' + new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch(e){}
}

// ── ОПРОС ─────────────────────────────────────────────
async function updatePoll(){
  if(currentMode !== 'poll' || !currentPollId) return;
  
  // Сначала пробуем API, иначе localPolls
  let poll = localPolls.find(p=>p.id===currentPollId);
  
  try{
    const res = await apiGet({action:'getPollResults', pollId:currentPollId});
    if(res.poll) poll = res.poll;
  }catch(e){}
  
  if(!poll) return;

  document.getElementById('poll-session').textContent = poll.session;
  document.getElementById('poll-question').textContent = poll.question;
  
  const total = poll.votes.reduce((a,b)=>a+b,0)||1;
  document.getElementById('poll-total').textContent = `${total} голосов`;

  const maxVotes = Math.max(...poll.votes)||1;

  document.getElementById('poll-options').innerHTML = poll.options.map((opt,i)=>{
    const pct = Math.round(poll.votes[i]/total*100);
    const isTop = poll.votes[i] === Math.max(...poll.votes) && poll.votes[i] > 0;
    return`<div class="poll-opt-row">
      <div class="poll-opt-label">${opt}</div>
      <div class="poll-bar-wrap">
        <div class="poll-bar-fill ${isTop?'top':''}" style="width:${pct}%"></div>
      </div>
      <div class="poll-opt-pct">${pct}%</div>
      <div class="poll-opt-count">${poll.votes[i]} гол.</div>
    </div>`;
  }).join('');
}

// ── INIT & LOOP ───────────────────────────────────────
async function init(){
  await Promise.all([updateRating(), checkMode()]);
  document.getElementById('loader').style.display = 'none';
}

init();
setInterval(async ()=>{
  await checkMode();
  if(currentMode==='rating') await updateRating();
  else await updatePoll();
}, 5000);
</script>
</body>
</html>
